name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:

  # ── Python daemon + CLI ──────────────────────────────────────────────────────
  python:
    name: Python (daemon + CLI)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        component: [daemon, cli]
    defaults:
      run:
        working-directory: kapsule-incus-manager/${{ matrix.component }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check kim

      - name: Type-check (mypy)
        run: mypy kim

      - name: Test (pytest)
        run: pytest --tb=short -q

  # ── Web UI ───────────────────────────────────────────────────────────────────
  web:
    name: Web UI (TypeScript)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: kapsule-incus-manager/ui-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # ── QML / C++ ────────────────────────────────────────────────────────────────
  qml:
    name: QML / C++ (CMake configure)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            cmake ninja-build \
            qt6-base-dev qt6-declarative-dev \
            qt6-websockets-dev libdbus-1-dev

      - name: CMake configure
        run: |
          cmake -B kapsule-incus-manager/ui-qml/build \
                -S kapsule-incus-manager/ui-qml \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTS=OFF

      - name: CMake build
        run: cmake --build kapsule-incus-manager/ui-qml/build --parallel
